<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>シフト管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css
</head>

<body class="bg-light">

<div class="container py-4">

    <h1 class="text-center mb-4">📅 シフト管理（講師×生徒）</h1>

    <!-- ✅ 入力 -->
    <div class="card p-3 mb-4 shadow-sm">
        <form method="POST">
            <input name="teacher" class="form-control mb-2" placeholder="講師名" required>
            <input name="student" class="form-control mb-2" placeholder="生徒名" required>
            <input type="date" name="date" class="form-control mb-2" required>

            <button class="btn btn-primary w-100">追加</button>
        </form>
    </div>

    <!-- ✅ 表 -->
    <div class="card p-3 shadow-sm">
        <table class="table table-bordered text-center">
            <thead class="table-primary">
                <tr>
                    <th>講師</th>
                    <th>月</th>
                    <th>火</th>
                    <th>水</th>
                    <th>木</th>
                    <th>金</th>
                    <th>土</th>
                    <th>日</th>
                </tr>
            </thead>

            <tbody>
                {% for teacher, row in table.items() %}
                <tr>
                    <td>{{ teacher }}</td>

                    {% for day in ["月","火","水","木","金","土","日"] %}
                        <td>
                            {% for s in row["students"][day] %}
                                <div class="d-flex justify-content-between">
                                    <span>{{ s }}</span>

                                    /delete
                                        <input type="hidden" name="teacher" value="{{ teacher }}">
                                        <input type="hidden" name="student" value="{{ s }}">
                                        <input type="hidden" name="date" value="">
                                        <button class="btn btn-sm btn-danger">×</button>
                                    </form>
                                </div>
                            {% endfor %}
                        </td>
                    {% endfor %}

                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
