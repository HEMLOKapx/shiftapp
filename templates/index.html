<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

<h1 class="text-center mb-4">📅 シフト管理（週）</h1>

<!-- ✅ 入力 -->
<div class="card p-3 mb-4">
<form method="POST">

<input name="teacher" class="form-control mb-2" placeholder="講師名" required>
<input name="student" class="form-control mb-2" placeholder="生徒名">
<input type="date" name="date" class="form-control mb-2" required>

<button class="btn btn-primary w-100">登録</button>

</form>
</div>

<!-- ✅ 表 -->
<div class="card p-3">
<table class="table table-bordered text-center align-middle">

<thead>
<tr>
<th>講師</th>
<th>月</th>
<th>火</th>
<th>水</th>
<th>木</th>
<th>金</th>
<th>土</th>
<th>日</th>
</tr>
</thead>

<tbody>
{% for teacher, row in table.items() %}
<tr>

<td class="fw-bold text-primary">{{ teacher }}</td>

{% for day in ["月","火","水","木","金","土","日"] %}
<td>

{% for s in row[day] %}
<div class="d-flex justify-content-between align-items-center">

<span>{{ s }}</span>

<form action="/delete" method="POST" style="margin:0;">
<input type="hidden" name="teacher" value="{{ teacher }}">
<input type="hidden" name="student" value="{{ s }}">
<input type="hidden" name="date" value="{{ date_map[teacher][day] }}">
<button class="btn btn-sm btn-danger">×</button>
</form>

</div>
{% endfor %}

</td>
{% endfor %}

</tr>
{% endfor %}
</tbody>

</table>
</div>

</div>

</body>
</html>
