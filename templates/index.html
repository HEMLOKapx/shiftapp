<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト管理</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

<h1 class="text-center mb-4">📅 シフト管理</h1>

<!-- 講師登録 -->
<form method="POST" class="mb-3">
<input type="hidden" name="type" value="teacher">

<input name="teacher" class="form-control mb-2" placeholder="講師名" required>
<input type="date" name="date" class="form-control mb-2" required>

<button class="btn btn-primary w-100">講師追加</button>
</form>

<!-- 生徒登録 -->
<form method="POST" class="mb-4">
<input type="hidden" name="type" value="student">

<input name="student" class="form-control mb-2" placeholder="生徒名" required>
<input type="date" name="date" class="form-control mb-2" required>

<button class="btn btn-success w-100">生徒追加</button>
</form>

<!-- 表 -->
<table class="table table-bordered">

<thead>
<tr>
<th>曜日</th>
<th>内容</th>
</tr>
</thead>

<tbody>

{% for day, records in table.items() %}
<tr>

<td class="fw-bold text-primary">
    {{ day }}
    {% if day_dates[day] %}
        ({{ day_dates[day] }})
    {% endif %}
</td>

<td>

{% for r in records %}
<div class="mb-3 border p-2 rounded">

<div class="fw-bold text-primary">
    {{ r.display }}
</div>

<div class="d-flex justify-content-between align-items-center">
    <div class="fw-bold">{{ r.teacher }}</div>

    <!-- 講師削除 -->
    <form action="/delete_teacher" method="POST">
        <input type="hidden" name="date" value="{{ r.date }}">
        <input type="hidden" name="teacher" value="{{ r.teacher }}">
        <button class="btn btn-sm btn-danger">削除</button>
    </form>
</div>

{% for s in r.students %}
<div class="d-flex justify-content-between">

<span>{{ s }}</span>

<form action="/delete" method="POST">
<input type="hidden" name="date" value="{{ r.date }}">
<input type="hidden" name="teacher" value="{{ r.teacher }}">
<input type="hidden" name="student" value="{{ s }}">
<button class="btn btn-sm btn-danger">×</button>
</form>

</div>
{% endfor %}

</div>
{% endfor %}

</td>

</tr>
{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
