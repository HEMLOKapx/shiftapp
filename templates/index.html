<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

<h1 class="text-center mb-4">📅 シフト管理（曜日ごと）</h1>

<!-- ✅ 入力フォーム -->
<div class="card p-3 mb-4">
<form method="POST">

<input name="teacher" class="form-control mb-2" placeholder="講師名" required>
<input name="student" class="form-control mb-2" placeholder="生徒名">
<input type="date" name="date" class="form-control mb-2" required>

<button class="btn btn-primary w-100">登録</button>

</form>
</div>

<!-- ✅ 表 -->
<div class="card p-3">
<table class="table table-bordered text-center align-middle">

<thead>
<tr>
<th style="width:100px;">曜日</th>
<th>内容</th>
</tr>
</thead>

<tbody>

{% for day in ["月","火","水","木","金","土","日"] %}
<tr>

<td class="fw-bold text-primary">
    {{ day }}
</td>

<td>

    {% if table[day] %}
        {% for teacher, students in table[day].items() %}

        <div class="mb-2 p-2 border rounded bg-white">

            <!-- ✅ 講師名 -->
            <div class="fw-bold mb-1">{{ teacher }}</div>

            <!-- ✅ 生徒 -->
            {% for s in students %}
            <div class="d-flex justify-content-between align-items-center mb-1">

                <span>{{ s }}</span>

                <!-- ✅ 削除 -->
                <form action="/delete" method="POST" style="margin:0;">
                    <input type="hidden" name="teacher" value="{{ teacher }}">
                    <input type="hidden" name="student" value="{{ s }}">
                    <input type="hidden" name="date" value="{{ date_map[day][teacher] }}">

                    <button class="btn btn-sm btn-danger">×</button>
                </form>

            </div>
            {% endfor %}

        </div>

        {% endfor %}
    {% else %}
        <span class="text-muted">なし</span>
    {% endif %}

</td>

</tr>
{% endfor %}

</tbody>

</table>
</div>

</div>

</body>
</html>
