<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト管理</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

<h1 class="text-center mb-4">📅 シフト管理</h1>

<!-- ✅ 講師登録 -->
<form method="POST" class="mb-3">
    <input type="hidden" name="type" value="teacher">

    <input name="teacher" class="form-control mb-2" placeholder="講師名" required>
    <input type="date" name="date" class="form-control mb-2" required>

    <button class="btn btn-primary w-100">講師追加</button>
</form>

<!-- ✅ 生徒登録 -->
<form method="POST" class="mb-4">
    <input type="hidden" name="type" value="student">

    <input name="student" class="form-control mb-2" placeholder="生徒名" required>
    <input type="date" name="date" class="form-control mb-2" required>

    <button class="btn btn-success w-100">生徒追加</button>
</form>

<!-- ✅ 週切替（正しいリンク） -->
<div class="d-flex justify-content-center gap-3 mb-3">

<a href="/?week={{ offset - 1 }}" class="btn btn-outline-primary">
← 前週
</a>

<a href="/?week={{ offset + 1 }}" class="btn btn-outline-primary">
次週 →
</a>

</div>

<!-- ✅ 表 -->
<table class="table table-bordered text-center align-middle">

<thead>
<tr>

<th style="width:140px;">講師</th>

{% for h in headers %}
<th>{{ h }}</th>
{% endfor %}

</tr>
</thead>

<tbody>

{% for teacher, row in table.items() %}
<tr>

<td class="fw-bold text-primary">
    {{ teacher }}
</td>

{% for i in range(7) %}
<td>

{% if row[i] %}
    {% for s in row[i] %}
        <div>{{ s }}</div>
    {% endfor %}
{% endif %}

</td>
{% endfor %}

</tr>
{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
