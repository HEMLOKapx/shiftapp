<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

<h1 class="text-center mb-4">📅 シフト管理（週）</h1>

<!-- ✅ 講師登録 -->
<div class="card p-3 mb-3">
<h5>講師登録</h5>
<form method="POST">
<input type="hidden" name="type" value="teacher">

<input name="teacher" class="form-control mb-2" placeholder="講師名" required>
<input type="date" name="date" class="form-control mb-2" required>

<button class="btn btn-primary w-100">講師追加</button>
</form>
</div>

<!-- ✅ 生徒登録（講師入力なし🔥） -->
<div class="card p-3 mb-4">
<h5>生徒登録</h5>
<form method="POST">
<input type="hidden" name="type" value="student">

<input name="student" class="form-control mb-2" placeholder="生徒名" required>
<input type="date" name="date" class="form-control mb-2" required>

<button class="btn btn-success w-100">生徒追加</button>
</form>
</div>

<!-- ✅ 週表 -->
<div class="card p-3">
<table class="table table-bordered text-center align-middle">

<thead>
<tr>
<th>講師</th>
<th>月</th>
<th>火</th>
<th>水</th>
<th>木</th>
<th>金</th>
<th>土</th>
<th>日</th>
</tr>
</thead>

<tbody>
{% for teacher, row in table.items() %}
<tr>

<td class="fw-bold text-primary">{{ teacher }}</td>

{% for day in ["月","火","水","木","金","土","日"] %}
<td>

{% for s in row[day] %}
<div class="d-flex justify-content-between align-items-center mb-1">

<span>{{ s }}</span>

<form action="/delete" method="POST" style="margin:0;">
<input type="hidden" name="teacher" value="{{ teacher }}">
<input type="hidden" name="student" value="{{ s }}">
<input type="hidden" name="date" value="{{ date_map[teacher][day] }}">
<button class="btn btn-sm btn-danger">×</button>
</form>

</div>
{% endfor %}

</td>
{% endfor %}

</tr>
{% endfor %}
</tbody>

</table>
</div>

</div>

</body>
</html>
