<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>シフト管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <h1 class="text-center mb-4">📅 シフト管理</h1>

    <!-- 入力 -->
    <div class="card p-3 mb-4 shadow-sm">
        <form method="POST">
            <input name="name" class="form-control mb-2" placeholder="名前" required>
            <input type="date" name="date" class="form-control mb-2" required>
            <button type="submit" class="btn btn-primary w-100">追加</button>
        </form>
    </div>

    <!-- 表示 -->
    {% for date, names in data.items() %}
        <div class="card p-3 mb-3 shadow-sm">
            <h5 class="text-primary">{{ date }}</h5>

            <ul class="list-group">
                {% for n in names %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">

                        {{ n }}

                        <!-- ✅ 削除ボタン -->
                        <form action="/delete" method="POST" style="margin:0;">
                            <input type="hidden" name="date" value="{{ date }}">
                            <input type="hidden" name="name" value="{{ n }}">
                            <button type="submit" class="btn btn-danger btn-sm">削除</button>
                        </form>

                    </li>
                {% endfor %}
            </ul>

        </div>
    {% endfor %}

</div>

</body>
</html>
