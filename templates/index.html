<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css
</head>

<body class="bg-light">

<div class="container py-4">

<h1 class="text-center mb-4">📅 シフト管理（週）</h1>

<!-- 講師登録 -->
<div class="card p-3 mb-3">
<form method="POST">
<input type="hidden" name="type" value="teacher">
<input name="teacher" class="form-control mb-2" placeholder="講師名">
<input type="date" name="date" class="form-control mb-2">
<button class="btn btn-primary w-100">講師登録</button>
</form>
</div>

<!-- 生徒登録 -->
<div class="card p-3 mb-3">
<form method="POST">
<input type="hidden" name="type" value="student">
<input name="student" class="form-control mb-2" placeholder="生徒名">
<input type="date" name="date" class="form-control mb-2">
<button class="btn btn-success w-100">生徒追加</button>
</form>
</div>

<!-- ✅ 週表 -->
<div class="card p-3">
<table class="table table-bordered text-center">

<thead>
<tr>
<th>講師</th>
<th>月</th>
<th>火</th>
<th>水</th>
<th>木</th>
<th>金</th>
<th>土</th>
<th>日</th>
</tr>
</thead>

<tbody>
{% for teacher, row in table.items() %}
<tr>

<td class="fw-bold">{{ teacher }}</td>

{% for day in ["月","火","水","木","金","土","日"] %}
<td>

{% for s in row[day] %}
<div class="d-flex justify-content-between">

<span>{{ s }}</span>

</div>
{% endfor %}

</td>
{% endfor %}

</tr>
{% endfor %}
</tbody>

</table>
</div>

</div>
</body>
</html>
