<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

<h1 class="text-center mb-4">📅 シフト管理（曜日＋日付）</h1>

<!-- ✅ 講師登録 -->
<div class="card p-3 mb-3">
<h5>講師登録</h5>
<form method="POST">
<input type="hidden" name="type" value="teacher">

<input name="teacher" class="form-control mb-2" placeholder="講師名" required>
<input type="date" name="date" class="form-control mb-2" required>

<button class="btn btn-primary w-100">講師追加</button>
</form>
</div>


<!-- ✅ 生徒登録 -->
<div class="card p-3 mb-4">
<h5>生徒登録</h5>
<form method="POST">
<input type="hidden" name="type" value="student">

<input name="student" class="form-control mb-2" placeholder="生徒名" required>
<input type="date" name="date" class="form-control mb-2" required>

<button class="btn btn-success w-100">生徒追加</button>
</form>
</div>


<!-- ✅ 表 -->
<div class="card p-3">
<table class="table table-bordered">

<thead>
<tr>
<th style="width:100px;">曜日</th>
<th>詳細</th>
</tr>
</thead>

<tbody>

{% for day in ["月","火","水","木","金","土","日"] %}
<tr>

<td class="fw-bold text-primary">
    {{ day }}
</td>

<td>

{% if table[day] %}
    {% for r in table[day] %}

    <div class="mb-3 border p-2 rounded bg-white">

        <!-- ✅ 日付 -->
        <div class="text-primary fw-bold">
            {{ r.date }}
        </div>

        <!-- ✅ 講師 -->
        <div class="fw-bold">
            {{ r.teacher }}
        </div>

        <!-- ✅ 生徒 -->
        {% for s in r.students %}
        <div class="d-flex justify-content-between">

            <span>{{ s }}</span>

            <form action="/delete" method="POST">
                <input type="hidden" name="date" value="{{ r.date }}">
                <input type="hidden" name="teacher" value="{{ r.teacher }}">
                <input type="hidden" name="student" value="{{ s }}">
                <button class="btn btn-sm btn-danger">×</button>
            </form>

        </div>
        {% endfor %}

    </div>

    {% endfor %}
{% else %}
    <span class="text-muted">なし</span>
{% endif %}

</td>

</tr>
{% endfor %}

</tbody>

</table>
</div>

</div>

</body>
</html>
