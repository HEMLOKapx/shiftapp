<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト管理</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-4">

<h1 class="text-center mb-4">📅 シフト管理（週）</h1>

<!-- 入力 -->
<form method="POST" class="mb-3">
<input type="hidden" name="type" value="teacher">
<input name="teacher" placeholder="講師名" required>
<input type="date" name="date" required>
<button>講師追加</button>
</form>

<form method="POST" class="mb-4">
<input type="hidden" name="type" value="student">
<input name="student" placeholder="生徒名" required>
<input type="date" name="date" required>
<button>生徒追加</button>
</form>

<!-- ✅ 表 -->
<table class="table table-bordered text-center">

<thead>
<tr>

{% for i in range(7) %}
<th>
    {% if headers[i] %}
        {{ headers[i] }}
    {% else %}
        {{ ["月","火","水","木","金","土","日"][i] }}
    {% endif %}
</th>
{% endfor %}

</tr>
</thead>

<tbody>
<tr>

{% for i in range(7) %}
<td>

{% for r in table[i] %}

<div class="mb-2 border p-2">

<b>{{ r.teacher }}</b><br>

{% for s in r.students %}
<div>{{ s }}</div>
{% endfor %}

</div>

{% endfor %}

</td>
{% endfor %}

</tr>

</tbody>

</table>

</div>
</body>
</html>
